<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=2.0, minimum-scale=0.5">
    <title>Для Майи 💜</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Montserrat:wght@300;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-tap-highlight-color: transparent;

            background: url('IMG_7777.jpg') center/cover no-repeat fixed;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(30, 0, 60, 0.55);
            z-index: 0;
            pointer-events: none;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .page-layout {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            max-width: 95vw;
        }

        .side-photo {
            width: 250px;
            height: 450px;
            object-fit: cover;
            border-radius: 1.5rem;
            box-shadow: 0 0 45px rgba(180, 130, 255, 0.8), 0 20px 40px rgba(0,0,0,0.6);
            border: 3px solid rgba(255, 255, 255, 0.55);
            transition: transform 0.3s ease, box-shadow 0.3s;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(4px);
        }

        .side-photo:hover {
            transform: scale(1.05);
            box-shadow: 0 0 60px #d8a6e0, 0 25px 50px rgba(0,0,0,0.7);
        }

        .container {
            text-align: center;
            color: white;
            padding: 2rem 1.5rem;
            border-radius: 3rem;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3), 0 0 40px rgba(180, 130, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 95vw;
            width: 380px;
            transition: transform 0.2s ease;
            cursor: default;
            position: relative;
        }

        .container:active {
            transform: scale(0.98);
        }

        h1 {
            font-family: 'Pacifico', cursive;
            font-size: clamp(2.5rem, 10vw, 4rem);
            margin-bottom: 0.3rem;
            text-shadow: 0 0 25px #e0b0ff, 0 0 15px #b57edc;
            letter-spacing: 2px;
            word-break: break-word;
        }

        .sub-message {
            font-size: 1.3rem;
            font-weight: 300;
            margin: 0.5rem 0 1.5rem;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.7);
            opacity: 0.9;
        }

        .extra-message {
            font-size: 1.1rem;
            font-weight: 300;
            margin: -0.8rem 0 1.8rem;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.7);
            opacity: 0.85;
            font-style: italic;
        }

        .gallery-wrapper {
            margin: 0 auto 1.4rem;
            max-width: 280px;
        }

        .gallery {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            border-radius: 2rem;
            box-shadow: 0 0 30px rgba(180, 130, 255, 0.7), 0 10px 25px rgba(0,0,0,0.4);
            background: rgba(0,0,0,0.2);
            -webkit-overflow-scrolling: touch;
        }

        .gallery::-webkit-scrollbar {
            display: none;
        }

        .slide {
            scroll-snap-align: center;
            flex: 0 0 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .slide img {
            width: 100%;
            height: auto;
            max-height: 260px;
            object-fit: cover;
            display: block;
            border-radius: 2rem;
            transition: transform 0.3s ease;
        }

        .dots {
            display: flex;
            justify-content: center;
            gap: 0.6rem;
            margin-top: 0.8rem;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 8px #d8a6e0;
        }

        .dot.active {
            background: white;
            transform: scale(1.3);
            box-shadow: 0 0 15px #ffb3ff;
        }

        .counter {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem 1.5rem;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 3rem;
            padding: 1rem 1.8rem;
            backdrop-filter: blur(5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
        }

        .time-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 60px;
        }

        .time-number {
            font-size: 2.2rem;
            line-height: 1;
            text-shadow: 0 0 15px #ffb3ff;
        }

        .time-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 0.2rem;
            opacity: 0.8;
        }

        .hint {
            margin-top: 1.5rem;
            font-size: 0.85rem;
            font-weight: 300;
            opacity: 0.7;
            letter-spacing: 1px;
        }

        /* Кнопка-сердечко для музыки */
        .music-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: none;
            border: none;
            font-size: 2.2rem;
            cursor: pointer;
            filter: drop-shadow(0 0 12px #ffb3ff);
            transition: transform 0.3s, filter 0.3s;
            z-index: 20;
            animation: pulse 2s infinite;
            background: transparent;
            outline: none;
        }

        .music-btn:hover {
            transform: scale(1.2);
            filter: drop-shadow(0 0 20px #ff80bf);
        }

        .music-btn.playing {
            animation: none;
            filter: drop-shadow(0 0 20px #ff4da6);
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        @media (max-width: 950px) {
            .side-photo {
                display: none;
            }
            .page-layout {
                gap: 0;
            }
            .container {
                width: 380px;
            }
            .music-btn {
                top: 10px;
                right: 15px;
                font-size: 2rem;
                width: 44px;
                height: 44px;
            }
        }

        @media (max-width: 420px) {
            .container {
                width: 300px;
                padding: 1.5rem 1rem;
            }
            .gallery-wrapper {
                max-width: 240px;
            }
            .slide img {
                max-height: 210px;
            }
            .music-btn {
                top: 5px;
                right: 10px;
                font-size: 1.8rem;
                width: 40px;
                height: 40px;
            }
        }
    </style>
</head>
<body>
    <canvas id="loveCanvas"></canvas>

    <div class="page-layout">
        <img src="IMG_6338.jpg" alt="Майя слева" class="side-photo">
        
        <div class="container">
            <!-- Кнопка-сердечко для музыки -->
            <button id="musicToggle" class="music-btn" aria-label="Включить музыку">❤️</button>

            <h1>Майя,</h1>
            <div class="sub-message">ты самая прекрасная</div>
            <div class="extra-message">Ты луч утреннего солнца в моей жизни</div>

            <div class="gallery-wrapper">
                <div class="gallery" id="gallery">
                    <div class="slide"><img src="IMG_7778.jpg" alt="Фото 1"></div>
                    <div class="slide"><img src="IMG_7775.jpg" alt="Фото 2"></div>
                    <div class="slide"><img src="IMG_6119.jpg" alt="Фото 3"></div>
                    <div class="slide"><img src="IMG_4206.jpg" alt="Фото 4"></div>
                </div>
                <div class="dots" id="dotsContainer"></div>
            </div>

            <div class="counter" id="timer">
                <div class="time-block"><span class="time-number" id="days">0</span><span class="time-label">дней</span></div>
                <div class="time-block"><span class="time-number" id="hours">0</span><span class="time-label">часов</span></div>
                <div class="time-block"><span class="time-number" id="minutes">0</span><span class="time-label">минут</span></div>
                <div class="time-block"><span class="time-number" id="seconds">0</span><span class="time-label">секунд</span></div>
            </div>

            <div class="hint">Коснись экрана, чтобы почувствовать ❤️</div>
        </div>

        <img src="IMG_7407.jpg" alt="Майя справа" class="side-photo">
    </div>

    <!-- Аудио-плеер -->
    <audio id="bgMusic" loop>
        <!-- Если загрузил свой mp3, замени src на "song.mp3" -->
        <source src="song.mp3" type="audio/mpeg">
    
    </audio>

    <script>
        // ---------- Управление музыкой ----------
        const musicBtn = document.getElementById('musicToggle');
        const bgMusic = document.getElementById('bgMusic');
        let musicPlaying = false;

        musicBtn.addEventListener('click', () => {
            if (musicPlaying) {
                bgMusic.pause();
                musicBtn.classList.remove('playing');
                musicBtn.style.animation = 'pulse 2s infinite'; // возвращаем пульсацию
            } else {
                bgMusic.play().catch(e => {
                    alert('Нажмите ещё раз – браузер требует взаимодействия для воспроизведения.');
                });
                musicBtn.classList.add('playing');
                musicBtn.style.animation = 'none'; // останавливаем пульсацию при воспроизведении
            }
            musicPlaying = !musicPlaying;
        });

        // Синхронизация при завершении трека (хотя он зациклен)
        bgMusic.addEventListener('ended', () => {
            musicPlaying = false;
            musicBtn.classList.remove('playing');
            musicBtn.style.animation = 'pulse 2s infinite';
        });

        // ---------- Галерея ----------
        const gallery = document.getElementById('gallery');
        const slides = document.querySelectorAll('.slide');
        const dotsContainer = document.getElementById('dotsContainer');
        let dots = [];

        slides.forEach((_, i) => {
            const dot = document.createElement('span');
            dot.className = 'dot';
            dot.addEventListener('click', () => {
                gallery.scrollTo({ left: gallery.clientWidth * i, behavior: 'smooth' });
            });
            dotsContainer.appendChild(dot);
            dots.push(dot);
        });

        function updateActiveDot() {
            const scrollLeft = gallery.scrollLeft;
            const width = gallery.clientWidth;
            const index = Math.round(scrollLeft / width);
            dots.forEach((dot, i) => dot.classList.toggle('active', i === index));
        }

        gallery.addEventListener('scroll', updateActiveDot);
        window.addEventListener('resize', updateActiveDot);
        dots[0]?.classList.add('active');

        // ---------- Счётчик ----------
        const startDate = new Date(2026, 4, 1, 0, 0, 0);
        const daysEl = document.getElementById('days');
        const hoursEl = document.getElementById('hours');
        const minutesEl = document.getElementById('minutes');
        const secondsEl = document.getElementById('seconds');

        function updateTimer() {
            const now = new Date();
            const diff = now - startDate;
            if (diff < 0) {
                daysEl.textContent = hoursEl.textContent = minutesEl.textContent = secondsEl.textContent = '0';
                return;
            }
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);
            daysEl.textContent = days;
            hoursEl.textContent = hours;
            minutesEl.textContent = minutes;
            secondsEl.textContent = seconds;
        }
        updateTimer();
        setInterval(updateTimer, 1000);

        // ---------- Сердечки и звёзды ----------
        const canvas = document.getElementById('loveCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, particles = [], mouseX, mouseY, mouseActive = false;

        function drawHeart(ctx, x, y, size, alpha) {
            ctx.save(); ctx.translate(x, y);
            const scale = size / 22; ctx.scale(scale, scale);
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.bezierCurveTo(-10, -10, -20, 5, 0, 16);
            ctx.bezierCurveTo(20, 5, 10, -10, 0, 0);
            ctx.closePath();
            ctx.fillStyle = `rgba(255, 120, 180, ${alpha})`;
            ctx.fill(); ctx.restore();
        }

        function drawStar(ctx, x, y, size, alpha) {
            ctx.save(); ctx.translate(x, y);
            const outerR = size/2, innerR = size/5;
            let rot = Math.PI/2*3; const step = Math.PI/5;
            ctx.beginPath();
            ctx.moveTo(0, -outerR);
            for (let i=0; i<5; i++) {
                let x1 = Math.cos(rot)*outerR, y1 = Math.sin(rot)*outerR;
                ctx.lineTo(x1, y1); rot += step;
                let x2 = Math.cos(rot)*innerR, y2 = Math.sin(rot)*innerR;
                ctx.lineTo(x2, y2); rot += step;
            }
            ctx.closePath();
            ctx.fillStyle = `rgba(255, 215, 0, ${alpha})`;
            ctx.fill(); ctx.restore();
        }

        class Particle {
            constructor(x,y,type,vx,vy,size,alpha) {
                this.x=x; this.y=y; this.type=type; this.vx=vx; this.vy=vy;
                this.size=size; this.alpha=alpha; this.gravity=0.03; this.friction=0.998; this.shrink=0.997;
            }
            update() {
                this.vy+=this.gravity; this.vx*=this.friction; this.vy*=this.friction;
                this.x+=this.vx; this.y+=this.vy; this.size*=this.shrink; this.alpha-=0.002;
                if(this.alpha<0) this.alpha=0;
            }
            draw(ctx) {
                if(this.alpha<=0.02||this.size<1.5) return;
                if(this.type==='heart') drawHeart(ctx,this.x,this.y,this.size,this.alpha);
                else drawStar(ctx,this.x,this.y,this.size,this.alpha);
            }
            isDead() { return this.alpha<=0.01||this.size<1.0||this.y>height+50; }
        }

        function spawnFallingParticle() {
            return new Particle(Math.random()*width, -20, Math.random()<0.6?'heart':'star',
                (Math.random()-0.5)*0.8, 0.5+Math.random()*1.8, 12+Math.random()*20, 0.6+Math.random()*0.4);
        }

        function burstAt(px,py,count=12) {
            for(let i=0;i<count;i++) {
                let angle = Math.random()*Math.PI*2, speed = 1.5+Math.random()*4;
                particles.push(new Particle(px,py, Math.random()<0.5?'heart':'star',
                    Math.cos(angle)*speed, Math.sin(angle)*speed-1.5, 10+Math.random()*18, 0.7+Math.random()*0.3));
            }
        }

        function onMouseMove(e) {
            const rect = canvas.getBoundingClientRect();
            mouseX=e.clientX-rect.left; mouseY=e.clientY-rect.top; mouseActive=true;
            if(Math.random()<0.5) burstAt(mouseX,mouseY,2);
        }
        function onMouseLeave() { mouseActive=false; mouseX=null; mouseY=null; }
        function onTouchMove(e) {
            e.preventDefault();
            const touch = e.touches[0];
            if(!touch) return;
            const rect=canvas.getBoundingClientRect();
            mouseX=touch.clientX-rect.left; mouseY=touch.clientY-rect.top; mouseActive=true;
            burstAt(mouseX,mouseY,3);
        }
        function onTouchEnd() { mouseActive=false; mouseX=null; mouseY=null; }
        function onClick(e) {
            let cx,cy;
            if(e.touches) { cx=e.touches[0].clientX; cy=e.touches[0].clientY; }
            else { cx=e.clientX; cy=e.clientY; }
            const rect=canvas.getBoundingClientRect();
            burstAt(cx-rect.left, cy-rect.top, 18);
        }

        window.addEventListener('mousemove', onMouseMove);
        window.addEventListener('mouseleave', onMouseLeave);
        window.addEventListener('touchmove', onTouchMove, {passive: false});
        window.addEventListener('touchend', onTouchEnd);
        window.addEventListener('click', onClick);
        window.addEventListener('touchstart', (e) => onClick(e));

        function resizeCanvas() {
            width=window.innerWidth; height=window.innerHeight;
            canvas.width=width; canvas.height=height;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function animate() {
            ctx.clearRect(0,0,width,height);
            if(particles.length<120 && Math.random()<0.35) particles.push(spawnFallingParticle());
            for(let i=particles.length-1; i>=0; i--) {
                let p=particles[i]; p.update(); p.draw(ctx);
                if(p.isDead()) particles.splice(i,1);
            }
            if(mouseActive && mouseX!==null && mouseY!==null && Math.random()<0.3) burstAt(mouseX,mouseY,1);
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
